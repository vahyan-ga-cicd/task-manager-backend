name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_VAR_image_tag: ${{ github.sha }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_redis_host: ${{ secrets.REDIS_HOST }}
      TF_VAR_redis_port: ${{ secrets.REDIS_PORT }}
      TF_VAR_users_table: ${{ secrets.USERS_TABLE }}
      TF_VAR_tasks_table: ${{ secrets.TASKS_TABLE }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply (create infra if needed)
        run: terraform apply -auto-approve
        working-directory: terraform

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t task-manager-backend:${{ github.sha }} .

      - name: Tag Docker Image
        run: |
          docker tag task-manager-backend:${{ github.sha }} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/task-manager-backend:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/task-manager-backend:${{ github.sha }}

      - name: Update Lambda Image
        run: |
          aws lambda update-function-code \
          --function-name task-manager \
          --image-uri ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/task-manager-backend:${{ github.sha }}

name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout repository
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2️⃣ Configure AWS credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # 3️⃣ Login to Amazon ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    # 4️⃣ Set Image Tag (commit SHA)
    - name: Set Image Tag
      run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

    # Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t task-manager:$IMAGE_TAG .

    # 6️⃣ Tag Docker Image for ECR
    - name: Tag Docker Image
      run: |
        docker tag task-manager:$IMAGE_TAG \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/task-manager-backend:$IMAGE_TAG

    # 7️⃣ Push Image to ECR
    - name: Push Docker Image
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/task-manager-backend:latest

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      run: terraform init
      working-directory: terraform

    # 🔟 Terraform Format Check
    - name: Terraform Format
      run: terraform fmt -check
      working-directory: terraform

    # 11️⃣ Terraform Validate
    - name: Terraform Validate
      run: terraform validate
      working-directory: terraform

    # 12️⃣ Terraform Plan
    - name: Terraform Plan
      run: terraform plan
      working-directory: terraform
      env:
        TF_VAR_image_tag: ${{ github.sha }}

    # 13️⃣ Terraform Apply
    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: terraform
      env:
        TF_VAR_image_tag: ${{ github.sha }}
        TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
        TF_VAR_redis_host: ${{ secrets.REDIS_HOST }}
        TF_VAR_redis_port: ${{ secrets.REDIS_PORT }}
        TF_VAR_users_table: ${{ secrets.USERS_TABLE }}
        TF_VAR_tasks_table: ${{ secrets.TASKS_TABLE }}
